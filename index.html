<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sudoku Mini Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>🧩 Sudoku Mini Game</h1>
        <p class="subtitle">Challenge your mind with this classic puzzle!</p>
        <div class="game-controls">
            <button id="new-game">New Game</button>
            <button id="solve">Solve</button>
            <button id="clear">Clear</button>
            <span id="difficulty">
                Difficulty: 
                <select id="difficulty-select">
                    <option value="easy">Easy</option>
                    <option value="medium">Medium</option>
                    <option value="hard">Hard</option>
                </select>
            </span>
        </div>
        <div id="sudoku-grid" class="sudoku-grid"></div>
        <div id="number-popup" class="number-popup hidden">
            <div class="popup-content">
                <div class="popup-header">Select Number</div>
                <div class="number-grid">
                    <button class="number-btn" data-number="1">1</button>
                    <button class="number-btn" data-number="2">2</button>
                    <button class="number-btn" data-number="3">3</button>
                    <button class="number-btn" data-number="4">4</button>
                    <button class="number-btn" data-number="5">5</button>
                    <button class="number-btn" data-number="6">6</button>
                    <button class="number-btn" data-number="7">7</button>
                    <button class="number-btn" data-number="8">8</button>
                    <button class="number-btn" data-number="9">9</button>
                    <button class="number-btn delete-btn" data-number="0">✕</button>
                </div>
                <button class="close-popup">Cancel</button>
            </div>
        </div>
        <div id="message" class="message"></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
